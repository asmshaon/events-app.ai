x-php: &php
  image: events-app.ai:local
  build:
    context: .
    dockerfile: docker/php/Dockerfile
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  volumes:
    - ./:/var/www/html
  depends_on:
    mysql:
      condition: service_healthy

# Single source of truth for DB + mail so app/queue/scheduler can't drift.
x-db-env: &db-env
  DB_CONNECTION: mysql
  DB_HOST: mysql
  DB_PORT: 3306
  DB_DATABASE: events-app-ai
  DB_USERNAME: events_db_usr
  DB_PASSWORD: pass_not_secure
  # Outgoing mail is caught by the mailpit container (confirmation + reminders).
  MAIL_MAILER: smtp
  MAIL_HOST: mailpit
  MAIL_PORT: 1025

services:
  mysql:
    image: mysql:9.7
    environment:
      MYSQL_DATABASE: events-app-ai
      MYSQL_USER: events_db_usr
      MYSQL_PASSWORD: pass_not_secure
      MYSQL_ROOT_PASSWORD: pass_not_secure
    ports:
      - "3308:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppass_not_secure"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    <<: *php
    environment:
      <<: *db-env
      INSTALL_DEPS: "true"
      RUN_MIGRATIONS: "true"
    ports:
      - "8080:8000"

  queue:
    <<: *php
    command: php artisan queue:listen --tries=1 --timeout=0
    environment:
      <<: *db-env
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy

  scheduler:
    <<: *php
    command: php artisan schedule:work
    environment:
      <<: *db-env
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy

  vite:
    <<: *php
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      app:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1026:1025"   # SMTP
      - "8026:8025"   # web UI

volumes:
  mysql-data:
